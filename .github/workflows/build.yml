name: Build MeowBrowser (Nuitka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install PyQt5 PyQtWebEngine
          pip install nuitka zstandard
      
      - name: Build with Nuitka
        run: |
          nuitka --standalone --onefile --windows-console-mode=disable --enable-plugin=pyqt5 --include-data-dir=resources=resources main.py --output-filename=MeowBrowser.exe
      
      - uses: actions/upload-artifact@v4
        with:
          name: MeowBrowser
          path: MeowBrowser.exe
