name: Build MeowBrowser

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install PyQt5 PyQtWebEngine pyinstaller
      - name: Build
        run: pyinstaller --onefile --windowed --name MeowBrowser main.py
      - uses: actions/upload-artifact@v4
        with:
          name: MeowBrowser
          path: |
            dist/MeowBrowser.exe
            resources/
